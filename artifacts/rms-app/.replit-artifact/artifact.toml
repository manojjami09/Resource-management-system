kind = "web"
previewPath = "/"
title = "Resource Management System"
version = "1.0.0"
id = "artifacts/rms-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19875

[services.development]
run = "pnpm --filter @workspace/rms-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rms-app", "run", "build" ]
publicDir = "artifacts/rms-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19875"
BASE_PATH = "/"
